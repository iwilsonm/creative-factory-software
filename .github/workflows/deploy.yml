name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.219.6
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/ad-platform
            git pull origin main
            pm2 restart ad-platform
