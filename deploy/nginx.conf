# daciaautomation.com — app served at /admin, API at /api
# After placing this file, run: sudo certbot --nginx -d daciaautomation.com

server {
    listen 80;
    server_name daciaautomation.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name daciaautomation.com;

    # SSL certs managed by Certbot — these lines get filled in automatically
    # ssl_certificate /etc/letsencrypt/live/daciaautomation.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/daciaautomation.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;

    # Self-hosted fonts — serve directly from disk, cache forever
    location /admin/fonts/ {
        alias /opt/ad-platform/frontend/dist/fonts/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Vite hashed assets (JS/CSS) — serve directly from disk, cache forever
    location /admin/assets/ {
        alias /opt/ad-platform/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static files under /admin/ (favicon, manifest, images) — serve directly from disk
    location ~* ^/admin/.*\.(ico|png|jpg|jpeg|svg|webp|woff2?|ttf|eot|webmanifest)$ {
        root /opt/ad-platform/frontend/dist;
        rewrite ^/admin/(.*)$ /$1 break;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # API and SSE — never cache (unchanged)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Admin app — all /admin routes proxy to Express for SPA routing
    location /admin {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
    }

    # Root — redirect to /admin (replace with marketing site later)
    location = / {
        return 302 /admin;
    }

    # Catch old root-level routes (bookmarks) and redirect to /admin equivalents
    location / {
        return 302 /admin$request_uri;
    }
}
