#!/bin/bash
# ============================================================
# DACIA CREATIVE FILTER - Configuration
# ============================================================
# Part of the Dacia Recursive Agents team — Agent #2
# Role: Score batch output, group into flex ads, deploy winners
# ============================================================

# --- Project Paths ---
PROJECT_DIR="/opt/ad-platform"
FILTER_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
LOG_DIR="${FILTER_DIR}/logs"

# --- API Keys ---
export ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY:-}"

# --- Backend ---
BACKEND_URL="https://daciaautomation.com"     # Must be HTTPS for secure session cookies

# --- Convex ---
CONVEX_URL="${CONVEX_URL:-https://energized-hare-760.convex.cloud}"

# --- Model Configuration ---
SCORE_MODEL="claude-sonnet-4-5-20250929"
GROUP_MODEL="claude-sonnet-4-6"

# --- Scoring ---
SCORE_THRESHOLD=7                              # Minimum score (1-10) to pass
FLEX_AD_COUNT=2                                # Default flex ads per batch (per-project via scout_daily_flex_ads)
IMAGES_PER_FLEX=10                             # Images per flex ad
HEADLINES_TARGET=5                             # Target headlines per flex ad
HEADLINES_MIN=3                                # Minimum headlines to execute
PRIMARY_TEXTS_TARGET=5                         # Target primary texts per flex ad
PRIMARY_TEXTS_MIN=3                            # Minimum primary texts to execute
TOTAL_WINNERS=$((FLEX_AD_COUNT * IMAGES_PER_FLEX))  # 20

# --- Behavior ---
CHECK_INTERVAL=1800                            # 30 min — check for new completed batches
AUTO_DEPLOY=true                               # Auto-deploy to Ready to Post
TAG_REJECTED=true                              # Tag rejected ads as "Filter Rejected"
TAG_WINNERS=true                               # Tag deployed ads as "Filter Approved"

# --- Cost Controls ---
DAILY_BUDGET_CENTS=2000                        # $20.00/day

# --- Notification ---
NOTIFY_METHOD="none"                           # "slack", "webhook", "none"
SLACK_WEBHOOK_URL=""
WEBHOOK_URL=""

# --- Per-Project Defaults ---
# These get read from Convex project settings at runtime.
# The Dacia Creative Filter needs these fields to exist per project:
#
#   scout_default_campaign    — Campaign ID to file flex ads under
#   scout_cta                 — CTA button text (e.g. "Shop Now")
#   scout_display_link        — Display link (e.g. "healnaturally.com")
#   scout_facebook_page       — Facebook Page ID
#   scout_score_threshold     — Override global threshold per project (optional)
#   scout_enabled             — true/false to enable/disable per project
#
# If these don't exist yet, the FIXER_INSTRUCTIONS.md tells Claude Code to create them.
