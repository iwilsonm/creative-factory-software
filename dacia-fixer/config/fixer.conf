#!/bin/bash
# ============================================================
# DACIA FIXER - Configuration
# ============================================================
# Part of the Dacia Recursive Agents team
# Agent: Dacia Fixer — automated test, fix & batch resurrection
# ============================================================

# --- Project Paths ---
PROJECT_DIR="/opt/ad-platform"
FIXER_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
LOG_DIR="${FIXER_DIR}/logs"

# --- API Keys ---
ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY:-}"
GEMINI_API_KEY="${GEMINI_API_KEY:-}"

# --- Convex ---
CONVEX_URL="${CONVEX_URL:-https://energized-hare-760.convex.cloud}"

# --- Model Configuration ---
DIAGNOSIS_MODEL="gemini-2.5-flash"
DIAGNOSIS_PROVIDER="gemini"

FIX_MODEL="claude-sonnet-4-5-20250929"
FIX_PROVIDER="anthropic"

# --- Behavior ---
MAX_RETRIES=3
CHECK_INTERVAL=300                             # 300 = 5 min
AUTO_COMMIT=true
FIXER_BRANCH="fixer/auto-fixes"               # Dedicated branch for fixer commits
AUTO_PUSH=false                                # Push to remote after commit
RESURRECT_BATCHES=true
MAX_RESURRECT_AGE_HOURS=24

# --- Fix Ledger (self-improvement) ---
FIX_LEDGER="${FIXER_DIR}/fix_ledger.md"
MAX_LEDGER_ENTRIES=50                          # Keep last 50 fixes for context
PATTERN_ALERT_THRESHOLD=3                      # Alert if same file breaks 3+ times

# --- Cost Controls ---
DAILY_BUDGET_CENTS=133                         # $1.33/day = ~$40/month

# --- Notification ---
NOTIFY_METHOD="none"                           # "slack", "webhook", "none"
SLACK_WEBHOOK_URL=""
WEBHOOK_URL=""

# --- Health Probes (run every cycle, $0 cost — no LLM calls) ---
PROBE_FILTER_PASS_RATE_MIN=20              # Alert if <20% of ads pass scoring (0% = definitely broken)
PROBE_FILTER_STALE_HOURS=2                 # Alert if filter hasn't run in 2+ hours
PROBE_DIRECTOR_STALE_HOURS=14              # Alert if director hasn't run in 14+ hours
PROBE_BATCH_STUCK_MINUTES=90               # Alert if batch in processing >90 min
PROBE_BACKEND_HEALTH=true                  # Check /api/health endpoint
PROBE_FILTER_SCORING=true                  # Check filter scoring results
PROBE_DEPLOYMENT_PIPELINE=true             # Check if deployments are reaching RTP

# --- Extended Probes (F-L) ---
PROBE_COST_SYNC=true                  # Check OpenAI cost sync is running
PROBE_GEMINI_RATES=true               # Check Gemini rate refresh is running
PROBE_META_HEALTH=true                # Check Meta token + sync status
PROBE_API_KEYS=true                   # Validate API keys (throttled to hourly)
PROBE_NGINX=true                      # Check Nginx reverse proxy
PROBE_DISK_SPACE=true                 # Monitor disk usage + auto-clean
PROBE_FILTER_PROCESS=true             # Detect zombie filter processes

PROBE_API_KEY_INTERVAL_MIN=60         # Only test API keys once per hour
PROBE_DISK_WARN_PCT=85                # Warn + clean at 85%
PROBE_DISK_CRIT_PCT=90                # Alert at 90% (after cleaning)
PROBE_LOG_RETENTION_DAYS=7            # Delete agent logs older than 7 days
PROBE_META_TOKEN_WARN_DAYS=7          # Alert when Meta token expires in <7 days
PROBE_FILTER_ZOMBIE_MINUTES=30        # Kill filter process running >30 min

# --- Filter Paths ---
FILTER_DIR_PATH="/opt/ad-platform/dacia-creative-filter"
FILTER_LOG_DIR="${FILTER_DIR_PATH}/logs"
DIRECTOR_DIR_PATH="/opt/ad-platform/dacia-director"
DIRECTOR_LOG_DIR="${DIRECTOR_DIR_PATH}/logs"

# --- Test Suites ---
SUITES=(
  "batch_creation"
)

# --- Batch Creation Suite ---
batch_creation_context=(
  "backend/services/batchProcessor.js"
  "backend/services/scheduler.js"
  "backend/services/gemini.js"
  "backend/services/adGenerator.js"
  "backend/services/headlineGenerator.js"
  "backend/services/bodyCopyGenerator.js"
  "backend/routes/batches.js"
  "backend/services/costTracker.js"
  "backend/services/retry.js"
  "backend/services/rateLimiter.js"
  "backend/convexClient.js"
)

batch_creation_test_cmd="npm test -- --grep 'batch'"
