#!/bin/bash
# ============================================================
# DACIA FIXER - Configuration
# ============================================================
# Part of the Dacia Recursive Agents team
# Agent: Dacia Fixer — automated test, fix & batch resurrection
# ============================================================

# --- Project Paths ---
PROJECT_DIR="/opt/ad-platform"
FIXER_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
LOG_DIR="${FIXER_DIR}/logs"

# --- API Keys ---
ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY:-}"
GEMINI_API_KEY="${GEMINI_API_KEY:-}"

# --- Convex ---
CONVEX_URL="${CONVEX_URL:-https://energized-hare-760.convex.cloud}"

# --- Model Configuration ---
DIAGNOSIS_MODEL="gemini-2.5-flash"
DIAGNOSIS_PROVIDER="gemini"

FIX_MODEL="claude-sonnet-4-5-20250929"
FIX_PROVIDER="anthropic"

# --- Behavior ---
MAX_RETRIES=3
CHECK_INTERVAL=300                             # 300 = 5 min
AUTO_COMMIT=true
FIXER_BRANCH="fixer/auto-fixes"               # Dedicated branch for fixer commits
AUTO_PUSH=false                                # Push to remote after commit
RESURRECT_BATCHES=true
MAX_RESURRECT_AGE_HOURS=24

# --- Fix Ledger (self-improvement) ---
FIX_LEDGER="${FIXER_DIR}/fix_ledger.md"
MAX_LEDGER_ENTRIES=50                          # Keep last 50 fixes for context
PATTERN_ALERT_THRESHOLD=3                      # Alert if same file breaks 3+ times

# --- Cost Controls ---
DAILY_BUDGET_CENTS=133                         # $1.33/day = ~$40/month

# --- Notification ---
NOTIFY_METHOD="none"                           # "slack", "webhook", "none"
SLACK_WEBHOOK_URL=""
WEBHOOK_URL=""

# --- Test Suites ---
SUITES=(
  "batch_creation"
)

# --- Batch Creation Suite ---
batch_creation_context=(
  "backend/services/batchProcessor.js"
  "backend/services/scheduler.js"
  "backend/services/gemini.js"
  "backend/services/adGenerator.js"
  "backend/services/headlineGenerator.js"
  "backend/services/bodyCopyGenerator.js"
  "backend/routes/batches.js"
  "backend/services/costTracker.js"
  "backend/services/retry.js"
  "backend/services/rateLimiter.js"
  "backend/convexClient.js"
)

batch_creation_test_cmd="npm test -- --grep 'batch'"
